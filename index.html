<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miên Man Studio | Decor & 3D Printing</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/scrollreveal"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="https://github.com/nguyenvietanh2169-gif/MIEN_MAN_STUDIO/blob/main/LOGO%20MIENMAN%20FULL%20.png?raw=true" alt="Miên Man Studio Logo">
            </div>
            <h1>MIÊN MAN <span class="studio">STUDIO</span></h1>
            <p class="tagline">Decor & 3D Printing Lab</p>
        </header>

        <section class="products-grid">
            <div class="card">
                <img src="https://via.placeholder.com/400x500?text=Den+Decor" alt="Sản phẩm 1">
                <div class="card-info">
                    <span>Handcrafted</span>
                    <h3>Đèn Decor In 3D</h3>
                    <p>250.000đ</p>
                    <a href="#" class="buy-now">Khám phá</a>
                </div>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/400x500?text=Den+Ngu" alt="Sản phẩm 2">
                <div class="card-info">
                    <span>Limited</span>
                    <h3>Đèn Ngủ 3D Miên Man</h3>
                    <p>250.000đ</p>
                    <a href="#" class="buy-now">Khám phá</a>
                </div>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/400x500?text=Chau+Cay" alt="Sản phẩm 3">
                <div class="card-info">
                    <span>Captain P2S Series</span>
                    <h3>Chậu Cây Geometric</h3>
                    <p>180.000đ</p>
                    <a href="#" class="buy-now">Khám phá</a>
                </div>
            </div>
        </section>

        <nav class="links">
            <a href="#" class="btn"><i class="fab fa-facebook-f"></i> Facebook</a>
            <a href="#" class="btn"><i class="fas fa-shopping-cart"></i> Shopee</a>
            <a href="#" class="btn"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="#" class="btn"><i class="fas fa-comment"></i> Zalo</a>
        </nav>

        <footer>
            <p>Cảm ơn bạn đã mang Miên Man về nhà ❤️</p>
        </footer>
    </div>

    <script>
        const sr = ScrollReveal({
            duration: 1500,
            distance: '30px',
            reset: false
        });

        sr.reveal('header', { origin: 'top' });
        sr.reveal('.card', { origin: 'bottom', interval: 200 });
        sr.reveal('.links', { origin: 'bottom', delay: 500 });
    </script>
</body>
</html>
