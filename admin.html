<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Miên Man Studio</title>
    <link rel="apple-touch-icon" href="https://github.com/nguyenvietanh2169-gif/MIEN_MAN_STUDIO/blob/main/MIENMAN%20AVATAR%20ONLY%20LOGO.png?raw=true">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body style="background: #fdfaf5; padding: 20px; font-family: 'Montserrat', sans-serif;">
    <div style="max-width: 500px; margin: 0 auto;">
        
        <div style="text-align: center; margin-bottom: 20px;">
            <img src="https://github.com/nguyenvietanh2169-gif/MIEN_MAN_STUDIO/blob/main/MIENMAN%20AVATAR%20ONLY%20LOGO.png?raw=true" 
                 style="width: 80px; height: 80px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1);">
        </div>

        <div style="background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 30px;">
            <h2 id="form-title" style="text-align: center; margin-bottom: 25px; letter-spacing: 2px; font-size: 1.1rem; text-transform: uppercase;">Thêm sản phẩm mới</h2>
            
            <input type="hidden" id="edit-id"> <input type="text" id="pName" placeholder="Tên sản phẩm" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee; border-radius: 8px; font-size: 16px;">
            <input type="number" id="pPrice" placeholder="Giá niêm yết" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee; border-radius: 8px; font-size: 16px;">
            <input type="text" id="pTag" placeholder="Tag (New/Limited)" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee; border-radius: 8px; font-size: 16px;">
            <input type="text" id="pImage" placeholder="Link ảnh (.jpg/.png)" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee; border-radius: 8px; font-size: 16px;">
            <input type="text" id="pLink" placeholder="Link mua hàng" style="width:100%; padding:15px; margin-bottom:15px; border:1px solid #eee; border-radius: 8px; font-size: 16px;">
            
            <button id="submit-btn" onclick="saveProduct()" style="width:100%; padding:18px; background:#1a1a1a; color:#fff; border:none; border-radius: 8px; font-weight: 700; cursor:pointer; letter-spacing: 2px; text-transform: uppercase;">Đăng sản phẩm</button>
            <button id="cancel-btn" onclick="resetForm()" style="display:none; width:100%; padding:10px; margin-top:10px; background:none; border:none; color:#888; font-size: 0.8rem; text-decoration: underline;">Hủy chỉnh sửa</button>
            
            <div id="status" style="margin-top:15px; text-align:center; color: #1a1a1a; font-size: 0.85rem; letter-spacing: 1px; font-weight: 500;"></div>
        </div>

        <div style="background: #fff; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);">
            <h3 style="margin-bottom: 20px; font-size: 1rem; opacity: 0.8;">DANH SÁCH CỬA HÀNG</h3>
            <div id="admin-product-list">
                <p style="font-size: 0.8rem; opacity: 0.5;">Đang kết nối hệ thống...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBnrAgcfiB4FbWVPZbtdqUEGxPe1H5-c9Y",
            authDomain: "mien-man.firebaseapp.com",
            databaseURL: "https://mien-man-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mien-man",
            storageBucket: "mien-man.firebasestorage.app",
            messagingSenderId: "63266368634",
            appId: "1:63266368634:web:9a606371a46b45e52b9fc3",
            measurementId: "G-K11ZFF1CCM"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Hàm Lưu sản phẩm (Cả Thêm mới và Sửa)
        function saveProduct() {
            const id = document.getElementById('edit-id').value;
            const data = {
                name: document.getElementById('pName').value,
                price: document.getElementById('pPrice').value,
                tag: document.getElementById('pTag').value,
                image: document.getElementById('pImage').value,
                link: document.getElementById('pLink').value
            };

            if(data.name && data.price && data.image) {
                const ref = id ? db.ref('products/' + id) : db.ref('products').push();
                ref.set(data).then(() => {
                    document.getElementById('status').innerText = "Đã cập nhật sản phẩm";
                    resetForm();
                    setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
                });
            } else {
                alert("Vui lòng nhập đủ Tên, Giá và Ảnh.");
            }
        }

        // Đổ dữ liệu vào form để sửa
        function editProduct(id, name, price, tag, image, link) {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.getElementById('form-title').innerText = "Chỉnh sửa sản phẩm";
            document.getElementById('edit-id').value = id;
            document.getElementById('pName').value = name;
            document.getElementById('pPrice').value = price;
            document.getElementById('pTag').value = tag;
            document.getElementById('pImage').value = image;
            document.getElementById('pLink').value = link;
            document.getElementById('submit-btn').innerText = "Cập nhật thay đổi";
            document.getElementById('cancel-btn').style.display = "block";
        }

        function resetForm() {
            document.getElementById('form-title').innerText = "Thêm sản phẩm mới";
            document.getElementById('edit-id').value = "";
            document.querySelectorAll('input').forEach(input => input.value = '');
            document.getElementById('submit-btn').innerText = "Đăng sản phẩm";
            document.getElementById('cancel-btn').style.display = "none";
        }

        // Hiển thị danh sách
        const adminList = document.getElementById('admin-product-list');
        db.ref('products').on('value', (snapshot) => {
            const data = snapshot.val();
            adminList.innerHTML = '';
            if(!data) { adminList.innerHTML = 'Kệ hàng đang trống.'; return; }

            for (let id in data) {
                const item = data[id];
                adminList.innerHTML += `
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f5f5f5;">
                        <div style="display: flex; align-items: center; flex: 1;">
                            <img src="${item.image}" style="width: 45px; height: 45px; border-radius: 6px; object-fit: cover; margin-right: 12px;">
                            <div style="overflow: hidden;">
                                <div style="font-weight: 600; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${item.name}</div>
                                <div style="font-size: 0.75rem; color: #999;">${Number(item.price).toLocaleString()}đ</div>
                            </div>
                        </div>
                        <div style="display: flex; gap: 15px; margin-left: 10px;">
                            <button onclick="editProduct('${id}', '${item.name}', '${item.price}', '${item.tag}', '${item.image}', '${item.link}')" style="background: none; border: none; color: #c5a47e; cursor: pointer; font-size: 0.9rem;">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteProduct('${id}')" style="background: none; border: none; color: #ff7675; cursor: pointer; font-size: 0.9rem;">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                `;
            }
        });

        function deleteProduct(id) {
            if(confirm("Xác nhận gỡ sản phẩm này?")) {
                db.ref('products/' + id).remove();
            }
        }
    </script>
</body>
</html>
