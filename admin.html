<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Miên Man Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: #fdfaf5; padding: 20px;">
    <div style="max-width: 500px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
        <h2 style="text-align: center; margin-bottom: 20px;">Thêm sản phẩm mới</h2>
        
        <input type="text" id="pName" placeholder="Tên sản phẩm (Vd: Đèn Zodiac)" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd;">
        <input type="number" id="pPrice" placeholder="Giá (Vd: 250000)" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd;">
        <input type="text" id="pTag" placeholder="Tag (Vd: New, Best Seller)" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd;">
        <input type="text" id="pImage" placeholder="Link ảnh (Dán link từ iPhone)" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd;">
        <input type="text" id="pLink" placeholder="Link Shopee/Zalo" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd;">
        
        <button onclick="addProduct()" style="width:100%; padding:15px; background:#1a1a1a; color:#fff; border:none; cursor:pointer;">ĐĂNG BÁN NGAY</button>
        
        <div id="status" style="margin-top:15px; text-align:center; color: green;"></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script>
        const firebaseConfig = { databaseURL: "ĐƯỜNG_DẪN_DATABASE_CỦA_BẠN" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = parseInt(document.getElementById('pPrice').value);
            const tag = document.getElementById('pTag').value;
            const image = document.getElementById('pImage').value;
            const link = document.getElementById('pLink').value;

            if(name && price && image) {
                db.ref('products').push({ name, price, tag, image, link });
                document.getElementById('status').innerText = "Đã thêm thành công!";
                // Xóa form
                document.querySelectorAll('input').forEach(input => input.value = '');
            } else {
                alert("Vui lòng nhập đủ Tên, Giá và Ảnh!");
            }
        }
    </script>
</body>
</html>
