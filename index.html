<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miên Man Studio | Decor & 3D Printing</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/scrollreveal"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="https://github.com/nguyenvietanh2169-gif/MIEN_MAN_STUDIO/blob/main/LOGO%20MIENMAN%20FULL%20.png?raw=true" alt="Miên Man Studio Logo">
            </div>
            <h1>MIÊN MAN <span class="studio">STUDIO</span></h1>
            <p class="tagline">Decor & 3D Printing Lab</p>
        </header>

        <section class="products-grid" id="product-container">
            <p style="text-align: center; grid-column: 1/-1;">Đang tải bộ sưu tập...</p>
        </section>

        <nav class="links">
            <a href="#" class="btn"><i class="fab fa-facebook-f"></i> Facebook</a>
            <a href="#" class="btn"><i class="fas fa-shopping-cart"></i> Shopee</a>
            <a href="#" class="btn"><i class="fab fa-tiktok"></i> TikTok</a>
            <a href="#" class="btn"><i class="fas fa-comment"></i> Zalo</a>
        </nav>

        <footer>
            <p>Cảm ơn bạn đã mang Miên Man về nhà ❤️</p>
        </footer>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script>
      // Cấu hình Firebase đã sửa lỗi cú pháp
      const firebaseConfig = {
        apiKey: "AIzaSyBnrAgcfiB4FbWVPZbtdqUEGxPe1H5-c9Y",
        authDomain: "mien-man.firebaseapp.com",
        databaseURL: "https://mien-man-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "mien-man",
        storageBucket: "mien-man.firebasestorage.app",
        messagingSenderId: "63266368634",
        appId: "1:63266368634:web:9a606371a46b45e52b9fc3",
        measurementId: "G-K11ZFF1CCM"
      };

      // Khởi tạo Firebase
      firebase.initializeApp(firebaseConfig);
      const db = firebase.database();

      // Lấy dữ liệu sản phẩm
      const productContainer = document.getElementById('product-container');

      db.ref('products').on('value', (snapshot) => {
        const data = snapshot.val();
        productContainer.innerHTML = ''; 

        if (!data) {
            productContainer.innerHTML = '<p style="text-align: center; grid-column: 1/-1; opacity: 0.5;">Chưa có sản phẩm nào.</p>';
            return;
        }

        for (let id in data) {
            const item = data[id];
            productContainer.innerHTML += `
                <div class="card">
                    <img src="${item.image}" alt="${item.name}">
                    <div class="card-info">
                        <span>${item.tag || 'Handcrafted'}</span>
                        <h3>${item.name}</h3>
                        <p>${Number(item.price).toLocaleString()}đ</p>
                        <a href="${item.link || '#'}" class="buy-now">Khám phá</a>
                    </div>
                </div>
            `;
        }
        
        // Kích hoạt hiệu ứng sau khi render xong
        ScrollReveal().reveal('.card', { interval: 150, origin: 'bottom', distance: '30px', duration: 1000 });
      });

      // Hiệu ứng cho header và links
      ScrollReveal().reveal('header', { origin: 'top', duration: 1000 });
      ScrollReveal().reveal('.links', { origin: 'bottom', delay: 500, duration: 1000 });
    </script>
</body>
</html>
