<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miên Man Studio | Decor & 3D Printing</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="logo.png" alt="Miên Man Studio Logo">
            </div>
            <h1>MIÊN MAN <span class="studio">STUDIO</span></h1>
            <p class="tagline">Decor & 3D Printing Lab</p>
        </header>

        <section class="featured">
            <div class="card">
                <img src="featured-product.jpg" alt="Sản phẩm decor">
                <div class="card-info">
                    <span>Sản phẩm mới nhất</span>
                    <h3>Đèn Decor In 3D</h3>
                </div>
            </div>
        </section>

        <nav class="links">
            <a href="https://facebook.com/yourpage" class="btn">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/facebook-new.png" width="20"/>
                Cửa hàng Facebook
            </a>
            <a href="https://shopee.vn/yourshop" class="btn">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/shopee.png" width="20"/>
                Gian hàng Shopee
            </a>
            <a href="https://zalo.me/yourphone" class="btn">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/zalo.png" width="20"/>
                Tư vấn thiết kế (Zalo)
            </a>
            <a href="https://tiktok.com/@yourtiktok" class="btn">
                <img src="https://img.icons8.com/ios-filled/50/ffffff/tiktok.png" width="20"/>
                Behind The Scenes (TikTok)
            </a>
        </nav>

        <footer>
            <p>Cảm ơn bạn đã mang Miên Man về nhà ❤️</p>
        </footer>
    </div>
</body>
</html>
