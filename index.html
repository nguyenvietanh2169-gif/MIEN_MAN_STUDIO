<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miên Man Studio | Decor & 3D Printing</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/scrollreveal"></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="https://github.com/nguyenvietanh2169-gif/MIEN_MAN_STUDIO/blob/main/LOGO%20MIENMAN%20FULL%20.png?raw=true">
            </div>
            <h1>MIÊN MAN <span class="studio">STUDIO</span></h1>
            <p class="tagline">Decor & 3D Printing Lab</p>
        </header>

        <section class="products-grid">
            <div class="card">
                <img src="https://via.placeholder.com/400x300?text=San+Pham+1" alt="Sản phẩm 1">
                <div class="card-info">
                    <span>Mới nhất</span>
                    <h3>Đèn Decor In 3D</h3>
                    <p>Giá: 250k</p>
                    <a href="#" class="buy-now">Mua ngay</a>
                </div>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/400x300?text=San+Pham+2" alt="Sản phẩm 2">
                <div class="card-info">
                    <span>Hot</span>
                    <h3>Đèn Ngủ 3D Miên Man</h3>
                    <p>Giá: 250k</p>
                    <a href="#" class="buy-now">Mua ngay</a>
                </div>
            </div>

            <div class="card">
                <img src="https://via.placeholder.com/400x300?text=San+Pham+3" alt="Sản phẩm 3">
                <div class="card-info">
                    <span>Best Seller</span>
                    <h3>Chậu Cây Captain P2S</h3>
                    <p>Giá: 180k</p>
                    <a href="#" class="buy-now">Mua ngay</a>
                </div>
            </div>
        </section>

        <nav class="links">
            <a href="#" class="btn"><i class="fab fa-facebook-messenger"></i> &nbsp; Facebook</a>
            <a href="#" class="btn"><i class="fas fa-shopping-bag"></i> &nbsp; Shopee</a>
            <a href="#" class="btn"><i class="fab fa-tiktok"></i> &nbsp; TikTok</a>
            <a href="#" class="btn"><i class="fas fa-comment-dots"></i> &nbsp; Zalo Tư Vấn</a>
        </nav>

        <footer>
            <p>Cảm ơn bạn đã mang Miên Man về nhà ❤️</p>
        </footer>
    </div>

    <script>
        ScrollReveal().reveal('.card', { 
            delay: 200, 
            distance: '50px',
            interval: 150, // Tăng nhẹ để nhìn hiệu ứng "rượt đuổi" giữa các card rõ hơn
            origin: 'bottom',
            duration: 1000 // Tăng thời gian chạy animation cho mượt
        });
        ScrollReveal().reveal('header', { delay: 100, origin: 'top', distance: '30px' });
        ScrollReveal().reveal('.links', { delay: 400, origin: 'bottom', distance: '20px' });
    </script>
</body>
</html>
